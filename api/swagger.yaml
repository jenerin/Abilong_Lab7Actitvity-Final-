openapi: 3.0.0
info:
  title: IPT 2026 Authentication API
  description: Node.js + MySQL backend for the Angular Authentication System
  version: 1.0.0

servers:
  - url: http://localhost:4000
    description: Local development server

tags:
  - name: Accounts
    description: Account management and authentication

paths:
  /accounts/authenticate:
    post:
      tags: [Accounts]
      summary: Authenticate account credentials and return a JWT token
      operationId: authenticate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: admin@example.com
                password:
                  type: string
                  example: password123
      responses:
        '200':
          description: Account details with JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /accounts/register:
    post:
      tags: [Accounts]
      summary: Register a new account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Registration successful, please check your email for verification instructions
        '400':
          $ref: '#/components/responses/BadRequest'

  /accounts/verify-email:
    post:
      tags: [Accounts]
      summary: Verify a new account with a verification token
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Verification successful
        '400':
          $ref: '#/components/responses/BadRequest'

  /accounts/forgot-password:
    post:
      tags: [Accounts]
      summary: Submit email address to reset the password
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  example: user@example.com
      responses:
        '200':
          description: Password reset email sent

  /accounts/validate-reset-token:
    post:
      tags: [Accounts]
      summary: Validate the reset password token
      operationId: validateResetToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Token is valid
        '400':
          $ref: '#/components/responses/BadRequest'

  /accounts/reset-password:
    post:
      tags: [Accounts]
      summary: Reset the password
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password, confirmPassword]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 6
                confirmPassword:
                  type: string
      responses:
        '200':
          description: Password reset successful
        '400':
          $ref: '#/components/responses/BadRequest'

  /accounts/refresh-token:
    post:
      tags: [Accounts]
      summary: Use a refresh token cookie to get a new JWT token
      operationId: refreshToken
      responses:
        '200':
          description: Account details with new JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'

  /accounts/revoke-token:
    post:
      tags: [Accounts]
      summary: Revoke a refresh token
      operationId: revokeToken
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token revoked
        '401':
          $ref: '#/components/responses/Unauthorized'

  /accounts/:
    get:
      tags: [Accounts]
      summary: Get all accounts (Admin only)
      operationId: getAllAccounts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of all accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /accounts:
    post:
      tags: [Accounts]
      summary: Create a new account (Admin only)
      operationId: createAccount
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequest'
      responses:
        '200':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /accounts/{id}:
    get:
      tags: [Accounts]
      summary: Get account by ID
      operationId: getAccountById
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Accounts]
      summary: Update an account
      operationId: updateAccount
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRequest'
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [Accounts]
      summary: Delete an account (Admin only)
      operationId: deleteAccount
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Account deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AccountResponse:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [Admin, User]
        verified:
          type: string
          format: date-time
        jwtToken:
          type: string
        created:
          type: string
          format: date-time
        updated:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [firstName, lastName, email, password, confirmPassword, acceptTerms]
      properties:
        title:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        password:
          type: string
          minLength: 6
        confirmPassword:
          type: string
        acceptTerms:
          type: boolean

    CreateRequest:
      type: object
      required: [firstName, lastName, email, password, confirmPassword, role]
      properties:
        title:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        password:
          type: string
          minLength: 6
        confirmPassword:
          type: string
        role:
          type: string
          enum: [Admin, User]

    UpdateRequest:
      type: object
      properties:
        title:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        password:
          type: string
          minLength: 6
        confirmPassword:
          type: string
        role:
          type: string
          enum: [Admin, User]

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
