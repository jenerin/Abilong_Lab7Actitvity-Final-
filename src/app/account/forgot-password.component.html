<h2>Forgot Password</h2>
<p class="text-center mb-3" style="color:#1a3c34;font-size:0.88rem;">Enter your email to receive a reset link.</p>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <input
    type="email"
    formControlName="email"
    class="form-control"
    placeholder="Email"
    [ngClass]="{ 'is-invalid': submitted && f['email'].errors }"
  />
  <div *ngIf="submitted && f['email'].errors" class="invalid-feedback d-block">
    <span *ngIf="f['email'].errors['required']">Email is required</span>
    <span *ngIf="f['email'].errors['email']">Enter a valid email</span>
  </div>

  <button [disabled]="loading" class="btn btn-primary mt-2">
    <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
    Submit
  </button>
</form>

<div class="auth-links">
  Remember your password? <a routerLink="../login">[Sign In]</a>
</div>
