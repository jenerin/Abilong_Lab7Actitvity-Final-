<h2>Register</h2>

<form [formGroup]="form" (ngSubmit)="onSubmit()">

  <select
    formControlName="title"
    class="form-select"
    [ngClass]="{ 'is-invalid': submitted && f['title'].errors }">
    <option value="">Title</option>
    <option value="Mr">Mr</option>
    <option value="Mrs">Mrs</option>
    <option value="Ms">Ms</option>
    <option value="Dr">Dr</option>
  </select>
  <div *ngIf="submitted && f['title'].errors" class="invalid-feedback d-block">
    Title is required
  </div>

  <input
    type="text"
    formControlName="firstName"
    class="form-control"
    placeholder="First Name"
    [ngClass]="{ 'is-invalid': submitted && f['firstName'].errors }"
  />
  <div *ngIf="submitted && f['firstName'].errors" class="invalid-feedback d-block">
    First Name is required
  </div>

  <input
    type="text"
    formControlName="lastName"
    class="form-control"
    placeholder="Last Name"
    [ngClass]="{ 'is-invalid': submitted && f['lastName'].errors }"
  />
  <div *ngIf="submitted && f['lastName'].errors" class="invalid-feedback d-block">
    Last Name is required
  </div>

  <input
    type="email"
    formControlName="email"
    class="form-control"
    placeholder="Email"
    [ngClass]="{ 'is-invalid': submitted && f['email'].errors }"
  />
  <div *ngIf="submitted && f['email'].errors" class="invalid-feedback d-block">
    <span *ngIf="f['email'].errors?.['required']">Email is required</span>
    <span *ngIf="f['email'].errors?.['email']">Enter a valid email</span>
  </div>

  <input
    type="password"
    formControlName="password"
    class="form-control"
    placeholder="Password"
    [ngClass]="{ 'is-invalid': submitted && f['password'].errors }"
  />
  <div *ngIf="submitted && f['password'].errors" class="invalid-feedback d-block">
    <span *ngIf="f['password'].errors?.['required']">Password is required</span>
    <span *ngIf="f['password'].errors?.['minlength']">Min 6 characters</span>
  </div>

  <input
    type="password"
    formControlName="confirmPassword"
    class="form-control"
    placeholder="Confirm Password"
    [ngClass]="{ 'is-invalid': submitted && (f['confirmPassword'].errors || form.errors?.['mustMatch']) }"
  />
  <div *ngIf="submitted && (f['confirmPassword'].errors || form.errors?.['mustMatch'])" class="invalid-feedback d-block">
    <span *ngIf="f['confirmPassword'].errors?.['required']">Please confirm your password</span>
    <span *ngIf="form.errors?.['mustMatch']">Passwords do not match</span>
  </div>

  <div class="form-check">
    <input
      type="checkbox"
      formControlName="acceptTerms"
      class="form-check-input"
      id="acceptTerms"
      [ngClass]="{ 'is-invalid': submitted && f['acceptTerms'].errors }"
    />
    <label class="form-check-label" for="acceptTerms">
      I agree to the Terms &amp; Conditions
    </label>
    <div *ngIf="submitted && f['acceptTerms'].errors" class="invalid-feedback d-block">
      You must accept the Terms &amp; Conditions
    </div>
  </div>

  <button [disabled]="loading" class="btn btn-primary mt-3">
    <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
    Register
  </button>
</form>

<div class="auth-links mt-2">
  Already have an account? <a routerLink="../login">Log In</a>
</div>
