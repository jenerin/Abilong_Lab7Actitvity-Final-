<div *ngIf="tokenStatus === TokenStatus.Validating" class="text-center p-4">
  <div class="spinner-border" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
  <p class="mt-2">Validating token...</p>
</div>

<div *ngIf="tokenStatus === TokenStatus.Valid">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        class="form-control"
        [ngClass]="{ 'is-invalid': submitted && f['password'].errors }"
      />
      <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
        <div *ngIf="f['password'].errors['required']">Password is required</div>
        <div *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</div>
      </div>
    </div>

    <div class="mb-3">
      <label for="confirmPassword" class="form-label">Confirm Password</label>
      <input
        id="confirmPassword"
        type="password"
        formControlName="confirmPassword"
        class="form-control"
        [ngClass]="{ 'is-invalid': submitted && (f['confirmPassword'].errors || form.errors?.['mustMatch']) }"
      />
      <div *ngIf="submitted && (f['confirmPassword'].errors || form.errors?.['mustMatch'])" class="invalid-feedback">
        <div *ngIf="f['confirmPassword'].errors?.['required']">Confirm Password is required</div>
        <div *ngIf="form.errors?.['mustMatch']">Passwords do not match</div>
      </div>
    </div>

    <button [disabled]="loading" class="btn btn-primary">
      <span *ngIf="loading" class="spinner-border spinner-border-sm mr-1"></span>
      Reset Password
    </button>
  </form>
</div>

<div *ngIf="tokenStatus === TokenStatus.Invalid" class="alert alert-danger">
  <h5>Token validation failed</h5>
  <p>This password reset token is invalid or has expired. Please try <a routerLink="../forgot-password">requesting a new token</a>.</p>
</div>
