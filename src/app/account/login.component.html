<h2>Login</h2>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <input
    type="email"
    formControlName="email"
    class="form-control"
    placeholder="Email"
    [ngClass]="{ 'is-invalid': submitted && f['email'].errors }"
  />
  <div *ngIf="submitted && f['email'].errors" class="invalid-feedback d-block">
    <span *ngIf="f['email'].errors['required']">Email is required</span>
    <span *ngIf="f['email'].errors['email']">Enter a valid email</span>
  </div>

  <input
    [type]="showPassword ? 'text' : 'password'"
    formControlName="password"
    class="form-control"
    placeholder="Password"
    [ngClass]="{ 'is-invalid': submitted && f['password'].errors }"
  />
  <div *ngIf="submitted && f['password'].errors" class="invalid-feedback d-block">
    <span *ngIf="f['password'].errors['required']">Password is required</span>
  </div>

  <div class="text-end mb-3">
    <a routerLink="../forgot-password" style="font-size:0.85rem;">Forgot Password?</a>
  </div>

  <button [disabled]="loading" class="btn btn-primary">
    <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
    Log In
  </button>
</form>

<div class="auth-links">
  Don't have account? <a routerLink="../register">[Sign Up]</a>
</div>
