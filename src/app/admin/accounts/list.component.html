<div class="page-header">
  <h2>
    Accounts
    <a routerLink="add" class="add-account-link">Add Account</a>
  </h2>
</div>

<div class="content-card">
  <div *ngIf="!accounts" class="text-center py-4">
    <div class="spinner-border text-secondary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <table *ngIf="accounts" class="admin-table">
    <thead>
      <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let account of accounts">
        <td>{{ account.firstName }}</td>
        <td>{{ account.lastName }}</td>
        <td>{{ account.email }}</td>
        <td>
          <span class="role-badge" [ngClass]="account.role === 'Admin' ? 'admin' : 'user'">
            {{ account.role }}
          </span>
        </td>
        <td>
          <a [routerLink]="['edit', account.id]" class="btn-edit">Edit</a>
          <button
            (click)="deleteAccount(account.id || '')"
            [disabled]="account.isDeleting"
            class="btn-delete">
            <span *ngIf="account.isDeleting" class="spinner-border spinner-border-sm me-1"></span>
            Delete
          </button>
        </td>
      </tr>
      <tr *ngIf="accounts.length === 0">
        <td colspan="5" class="text-center text-muted py-3">No accounts found.</td>
      </tr>
    </tbody>
  </table>
</div>
