<div class="page-header">
  <h2>Home</h2>
</div>

<div class="content-card">
  <div class="profile-row">
    <div class="avatar">
      {{ account?.firstName?.charAt(0) }}{{ account?.lastName?.charAt(0) }}
    </div>
    <div class="profile-info">
      <h4>Hello, {{ account?.firstName }} {{ account?.lastName }}! 👋</h4>
      <span class="role-badge" [ngClass]="account?.role === 'Admin' ? 'admin' : 'user'">
        {{ account?.role }}
      </span>
      <p class="text-muted small">📧 {{ account?.email }}</p>
    </div>
  </div>
  <hr />
  <p class="text-muted mb-1">You are successfully logged in to the Angular Authentication System.</p>
</div>
