<div class="dashboard-layout" *ngIf="account">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">A</div>
      <div>
        <div class="sidebar-title">Auth System</div>
        <div class="sidebar-subtitle">Dashboard</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="sidebar-link">
        <span class="sidebar-icon">🏠</span> Home
      </a>
      <a routerLink="/profile" routerLinkActive="active" class="sidebar-link">
        <span class="sidebar-icon">👤</span> Profile
      </a>
      <a *ngIf="account.role === 'Admin'" routerLink="/admin" routerLinkActive="active" class="sidebar-link">
        <span class="sidebar-icon">⚙️</span> Admin
      </a>
    </nav>

    <div class="sidebar-footer">
      <a class="sidebar-link logout-link" (click)="logout()" style="cursor:pointer">
        <span class="sidebar-icon">🚪</span> Logout
      </a>
    </div>
  </div>

  <div class="dashboard-content">
    <alert></alert>
    <router-outlet name="subnav"></router-outlet>
    <router-outlet></router-outlet>
  </div>
</div>

<div *ngIf="!account">
  <alert></alert>
  <router-outlet></router-outlet>
</div>
